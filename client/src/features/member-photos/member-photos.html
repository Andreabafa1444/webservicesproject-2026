
@if(!memberService.editMode()){
    @if(photos(); as photos){
        @if(photos.length > 0 ){
            <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
                @for(photo of photos; track photo.id){
                    <div class="relative">
                        <img src="{{photo.url}}" alt="Member" class="w-full h-full "/>
                        <button (click)="setMainPhoto(photo)" [disabled]="photo.url === memberService.member()?.imageUrl" class="absolute top-1 z-50 cursor-pointer" >
                            <svg xmlns="http://www.w3.org/2000/svg"
                            [attr.fill] = "photo.url === memberService.member()?.imageUrl ? 'currentColor' : 'none'" 
                            fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                            [class.text-yellow-200]="photo.url === memberService.member()?.imageUrl"
                            [class.stroke-white]="photo.url === memberService.member()?.imageUrl" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                            </svg>

                        </button>
                    </div>
                    
                }
                
            </div>
        }@else {
            <p class="text-center  text-gray-500">No photos</p>
        }
    }
}@else {
    <app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()"/>
}
